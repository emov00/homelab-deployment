apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-cluster
  namespace: argocd
spec:
  project: bootstrap-project

  source:
    repoURL: https://github.com/emov00/homelab-deployment.git
    targetRevision: main
    path: homelab/cluster

  destination:
    name: homelab

  syncPolicy:
    syncOptions:
      - CreateNamespace=true