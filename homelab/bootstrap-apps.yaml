apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-apps
  namespace: argocd
    # Finalizer that ensures that  is not deleted until it is not referenced by any application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: bootstrap-project

  source:
    repoURL: https://github.com/emov00/homelab-deployment.git
    targetRevision: main
    path: homelab/apps

  destination:
    name: homelab

  syncPolicy:
    syncOptions:
      - CreateNamespace=true