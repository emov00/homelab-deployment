apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-apps
  namespace: argocd
spec:
  project: bootstrap-project

  source:
    repoURL: https://github.com/emov00/homelab-deployment.git
    targetRevision: main
    path: homelab/apps

  destination:
    name: homelab

  syncPolicy:
    syncOptions:
      - CreateNamespace=true